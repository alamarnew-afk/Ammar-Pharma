<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عمار فارما ERP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#046307">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
body{font-family:Arial;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#1b1b1b;padding:30px;border-radius:20px;width:320px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#046307;color:white;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h2 style="text-align:center;color:#D4AF37;">عمار فارما ERP</h2>
<input id="u" placeholder="اسم المستخدم">
<input id="p" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p style="text-align:center;">admin / 123</p>
</div>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('./service-worker.js');
}

function login(){
 const u=document.getElementById('u').value;
 const p=document.getElementById('p').value;

 if(u==='admin' && p==='123'){
   alert('تم تسجيل الدخول');
 }else{
   alert('بيانات خاطئة');
 }
}
</script>
</body>
</html>
